name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # The build-time sync pulls knomit's OpenAPI spec from the public knomit
      # repo — no token needed. Pin KNOMIT_REF to a tag/SHA once one exists;
      # `master` (the default branch) is the fallback until then.
      KNOMIT_REF: ${{ vars.KNOMIT_REF || 'master' }}
      SITE_URL: https://knomit.io
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (runs prebuild sync)
        run: npm run build

      - name: Type & content check
        run: npm run check

      # Hand the built site to the deploy job (main pushes only) so it ships the
      # exact artifact CI validated — no rebuild, no drift.
      - name: Upload built site
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Ship to Cloudflare Pages only after build/check/tests pass, and only for
  # pushes to main (never PRs). `needs` is the gate; the `if` scopes it to prod.
  deploy:
    needs: build-and-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=knomit-io --branch=main
